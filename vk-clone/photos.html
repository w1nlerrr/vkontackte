<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото — ВКонтакте</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="header__container">
            <a href="index.html" class="header__logo">
                <img src="images/logo.png" alt="VK" class="header__logo-icon">
                <span class="header__logo-text">ВКонтакте</span>
            </a>
            
            <div class="header__search">
                <svg class="header__search-icon" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" placeholder="Поиск">
            </div>
            
            <div class="header__icons">
                <button class="header__icon">
                    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                </button>
                <button class="header__icon">
                    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </button>
                <div class="header__avatar">
                    <img src="images/profile-avatar.jpg" alt="Профиль">
                </div>
            </div>
        </div>
    </header>

    <div class="layout">
        <nav class="left-sidebar">
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="profile.html" class="nav-link">
                        <img src="images/icon-profile.png" alt="" class="nav-icon-img">
                        <span>Профиль</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        <img src="images/icon-feed.png" alt="" class="nav-icon-img">
                        <span>Лента</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="messages.html" class="nav-link">
                        <img src="images/icon-messenger.png" alt="" class="nav-icon-img">
                        <span>Мессенджер</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="calls.html" class="nav-link">
                        <img src="images/icon-calls.png" alt="" class="nav-icon-img">
                        <span>Звонки</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="friends.html" class="nav-link">
                        <img src="images/icon-friends.png" alt="" class="nav-icon-img">
                        <span>Друзья</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="communities.html" class="nav-link">
                        <img src="images/icon-communities.png" alt="" class="nav-icon-img">
                        <span>Сообщества</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="photos.html" class="nav-link active">
                        <img src="images/icon-photos.png" alt="" class="nav-icon-img">
                        <span>Фото</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="music.html" class="nav-link">
                        <img src="images/icon-music.png" alt="" class="nav-icon-img">
                        <span>Музыка</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-video.png" alt="" class="nav-icon-img">
                        <span>Видео</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-clips.png" alt="" class="nav-icon-img">
                        <span>Клипы</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-games.png" alt="" class="nav-icon-img">
                        <span>Игры</span>
                        <span class="nav-badge">2</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="stickers.html" class="nav-link">
                        <img src="images/icon-stickers.png" alt="" class="nav-icon-img">
                        <span>Стикеры</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-market.png" alt="" class="nav-icon-img">
                        <span>Маркет</span>
                    </a>
                </li>
                <li class="nav-divider"></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-services.png" alt="" class="nav-icon-img">
                        <span>Сервисы</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-votes.png" alt="" class="nav-icon-img">
                        <span>Голоса</span>
                    </a>
                </li>
                <li class="nav-divider"></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-bookmarks.png" alt="" class="nav-icon-img">
                        <span>Закладки</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-advertising.png" alt="" class="nav-icon-img">
                        <span>Реклама</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-help.png" alt="" class="nav-icon-img">
                        <span>Помощь</span>
                    </a>
                </li>
                <li class="nav-divider"></li>
                <li class="nav-item">
                    <a href="#" class="nav-link">
                        <img src="images/icon-people-nearby.png" alt="" class="nav-icon-img">
                        <span>Люди рядом</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="photos-main">
            <div class="photos-header">
                <h1 class="photos-title">Мои фотографии</h1>
                <div class="photos-tabs">
                    <button class="photos-tab active">Фото</button>
                    <button class="photos-tab">Альбомы</button>
                </div>
                <div class="photos-actions">
                    <button class="photos-upload-btn">
                        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                        Загрузить фото
                    </button>
                    <button class="photos-more-btn">
                        <svg viewBox="0 0 24 24"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                    </button>
                    <button class="photos-settings-btn">
                        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L5.09 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    </button>
                </div>
            </div>

            <div class="photos-content">
                <div class="photos-empty">
                    <div class="photos-empty__icon">
                        <svg viewBox="0 0 24 24" class="photos-empty__icon-back">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="#8b5cf6"/>
                        </svg>
                        <svg viewBox="0 0 24 24" class="photos-empty__icon-front">
                            <rect x="2" y="6" width="18" height="14" rx="2" ry="2" fill="#3b82f6"/>
                            <circle cx="14" cy="12" r="2" fill="#fbbf24"/>
                            <path d="M2 16l4-4 3 3 4-4 5 5" stroke="white" stroke-width="1.5" fill="none"/>
                        </svg>
                    </div>
                    <p class="photos-empty__text">Вы ещё не загружали фото</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
